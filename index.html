<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>I!ne一客 | 優質乘車服務</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-blue: #002d5e;
            --accent-silver: #a0aec0;
            --line-green: #06c755;
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('bg.jpg');
            background-size: 100% auto;
            background-position: center bottom;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            margin: 0; padding: 15px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Noto Sans TC', sans-serif;
        }

        .main-card {
            background: rgba(26, 32, 44, 0.85); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100%; max-width: 480px;
            padding: 30px 20px; border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative; /* 為了讓內部的浮水印定位 */
            z-index: 1;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
            overflow: hidden; /* 防止浮水印超出範圍 */
        }

        /* --- 修正後的浮水印：墊在文字底下 --- */
        .bg-watermark {
            position: absolute;
            top: 14%; /* 讓它出現在輸入框與選項的區域 */
            left: 50%;
            transform: translate(-50%, 0);
            width: 110%;
            opacity: 0.12; /* 10% 透明度 */
            z-index: -1; /* 關鍵：讓它在文字與輸入框的後方 */
            pointer-events: none;
        }
        .bg-watermark img { width: 100%; height: auto; }

        .brand-zone { text-align: center; margin-bottom: 25px; position: relative; }
        .brand-logo { font-size: 32px; font-weight: 900; color: #fff; margin: 0; }
        .brand-tagline { font-size: 14px; color: var(--accent-silver); letter-spacing: 5px; margin-top: 5px; }

        .form-group { margin-bottom: 15px; position: relative; }
        .form-label { font-size: 11px; font-weight: 900; color: #fff; margin-bottom: 6px; display: block; }

        .input-box {
            width: 100%; padding: 15px 18px; 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 18px; 
            font-size: 15px; background: rgba(255, 255, 255, 0.9) !important; color: #000 !important;
            box-sizing: border-box;
            font-family: inherit;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; position: relative; }
        .option-item {
            background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 15px;
            display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
        }
        .option-item span { font-size: 13px; font-weight: 700; color: #fff; margin-left: 8px; }
        .option-full { grid-column: span 2; }

        #map { 
            width: 100%; height: 260px; 
            border-radius: 25px; 
            margin: 15px 0; 
            border: 2px solid rgba(255,255,255,0.2); 
            box-sizing: border-box;
            position: relative;
        }

        .btn-calculate { 
            width: 100%; background: #4a90e2; color: white; padding: 18px; 
            font-size: 18px; font-weight: 900; border: none; border-radius: 20px; cursor: pointer;
            font-family: inherit; transition: 0.3s;
        }

        /* 試算結果 */
        .result-panel { 
            margin-top: 20px; padding: 25px; border-radius: 30px; 
            background: rgba(255, 255, 255, 0.15) !important; 
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); 
            display: none; color: #fff;
        }
        .price-text { font-size: 46px; font-weight: 900; color: #63b3ed; }
        .detail-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        
        /* 新增：預估範圍小字樣式 */
        .price-range-small {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            text-align: right;
            margin-top: -5px;
            margin-bottom: 15px;
            font-weight: 300;
        }
        
        /* 計費標準區塊 */
        .static-fee-info {
            background: rgba(255, 255, 255, 0.6) !important; 
            backdrop-filter: blur(10px);
            width: 100%; max-width: 480px;
            padding: 25px 20px; border-radius: 30px;
            margin-top: 20px; margin-bottom: 80px; 
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 2;
        }
        .fee-title { font-size: 16px; font-weight: 900; color: var(--main-blue); margin-bottom: 12px; text-align: center; }
        .fee-row { display: flex; justify-content: space-between; font-size: 14px; color: #2d3748; margin-bottom: 6px; }
        .fee-row b { color: #000; }

        .btn-line { 
            width: 100%; background: var(--line-green); color: white; padding: 16px; 
            font-size: 17px; font-weight: 700; border: none; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="bg-watermark">
        <img src="Logo.jpg" alt="Watermark">
    </div>

    <div class="brand-zone">
        <h1 class="brand-logo">I!ne一客</h1>
        <div class="brand-tagline">優質乘車服務</div>
    </div>

    <div class="form-group">
        <label class="form-label">起點 Starting Point</label>
        <input type="text" id="start" class="input-box" placeholder="輸入出發地址">
    </div>

    <div class="form-group">
        <label class="form-label">終點 Destination</label>
        <input type="text" id="end" class="input-box" placeholder="輸入目的地">
    </div>

    <div class="options-grid">
        <label class="option-item option-full">
            <input type="checkbox" id="enableBooking" onchange="toggleBookingTime()"> 
            <span>📅 預約行程 (預約用，非即時)</span>
        </label>
        <div id="booking-time-container" class="form-group option-full" style="display:none;">
            <input type="datetime-local" id="pickupTime" class="input-box">
        </div>
        <label class="option-item"><input type="checkbox" id="avoidTolls"> <span>避開國道收費路段</span></label>
        <label class="option-item"><input type="checkbox" id="avoidHighways"> <span>避開高速道路</span></label>
        <label class="option-item option-full">
            <input type="checkbox" id="premiumCar"> <span>指定進口車 (隨機車款)起步價$150 低消300元</span>
        </label>
    </div>

    <div id="map"></div>
    
    <button id="calc-btn" class="btn-calculate" onclick="calculateFare()">規劃行程並試算費用</button>

    <div id="result" class="result-panel">
        <div class="detail-line"><span>需求類別</span><b id="display-type">即時出發</b></div>
        <div class="detail-line" id="res-time-row" style="display:none;"><span>預約時間</span><b id="display-time">-</b></div>
        <div class="detail-line"><span>預估路程</span><b id="display-dist">0 km</b></div>
        <div class="detail-line"><span>預估時間</span><b id="display-duration">0 min</b></div>
        <hr style="border:0; border-top:1px dashed rgba(255,255,255,0.1); margin:15px 0;">
        <div class="detail-line"><span>里程費用</span><b id="dist-fee">$0</b></div>
        <div class="detail-line"><span>長途附加</span><b id="long-fee">$0</b></div>
        <div class="detail-line"><span>行車時間</span><b id="time-fee">$0</b></div>
        <div class="detail-line"><span>起步車資</span><b id="display-start-fee">$80</b></div>
        <div class="detail-line total-row" style="align-items: center;">
            <span style="font-weight:900;">總計金額</span>
            <span id="price-tag" class="price-text">$0</span>
        </div>
        <div id="price-range-display" class="price-range-small"></div>

        <button class="btn-line" onclick="copyAndLine()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" width="20"> 複製資訊並預約
        </button>
    </div>
</div>

<div class="static-fee-info" id="fee-info-box">
    <div class="fee-title">📋 計費標準</div>
    <div class="fee-row"><span><b>隨機派遣起步價</span>80 元</b></div>
    <div class="fee-row"><span><b>指定進口車起步價</span>150 元</b></div>
    <div class="fee-row"><span><b>基本里程費</span>15 元 / km</b></div>
    <div class="fee-row"><span><b>行車時間費</span>3 元 / min</b></div>
    <div class="fee-row"><span><b>長途附加費(逾15km)</span>10 元 / km </b></div>
</div>

<script>
    let map, directionsService, directionsRenderer;
    let currentTotal = 0;
    let finalDist = 0;
    let finalTime = 0;
    let detailMsg = "";

    function toggleBookingTime() {
        const container = document.getElementById('booking-time-container');
        container.style.display = document.getElementById('enableBooking').checked ? 'block' : 'none';
    }

    function initMap() {
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ polylineOptions: { strokeColor: "#4a90e2", strokeWeight: 6 } });
        map = new google.maps.Map(document.getElementById("map"), { zoom: 13, center: { lat: 24.1477, lng: 120.6736 }, disableDefaultUI: true, zoomControl: true });
        directionsRenderer.setMap(map);
        const opt = { componentRestrictions: { country: "tw" } };
        new google.maps.places.Autocomplete(document.getElementById('start'), opt);
        new google.maps.places.Autocomplete(document.getElementById('end'), opt);
    }

    function calculateFare() {
        const startVal = document.getElementById('start').value;
        const endVal = document.getElementById('end').value;
        const btn = document.getElementById('calc-btn');
        const feeInfoBox = document.getElementById('fee-info-box');
        if (!startVal || !endVal) { alert('請填寫完整地址'); return; }
        
        btn.disabled = true; btn.innerText = "規劃中...";
        directionsService.route({ 
            origin: startVal, destination: endVal, travelMode: 'DRIVING',
            avoidTolls: document.getElementById('avoidTolls').checked,
            avoidHighways: document.getElementById('avoidHighways').checked
        }, function(result, status) {
            btn.disabled = false; btn.innerText = "規劃行程並試算費用";
            if (status === 'OK') {
                directionsRenderer.setDirections(result);
                const leg = result.routes[0].legs[0];
                finalDist = leg.distance.value / 1000;
                finalTime = Math.ceil(leg.duration.value / 60);
                
                let startFee = document.getElementById('premiumCar').checked ? 150 : 80;
                let baseDistFee = Math.round(finalDist * 15);
                let intDist = Math.floor(finalDist); // 長途不計小數點
                let longDistFee = intDist > 15 ? (intDist - 15) * 10 : 0;
                let timeFee = finalTime * 3;
                currentTotal = Math.floor((baseDistFee + longDistFee + timeFee + startFee) / 10) * 10;

                document.getElementById('display-dist').innerText = finalDist.toFixed(1) + " km";
                document.getElementById('display-duration').innerText = finalTime + " min";
                document.getElementById('display-start-fee').innerText = "$" + startFee;
                document.getElementById('dist-fee').innerText = "$" + baseDistFee;
                document.getElementById('long-fee').innerText = "$" + longDistFee;
                document.getElementById('time-fee').innerText = "$" + timeFee;
                document.getElementById('price-tag').innerText = "$" + currentTotal;

                // --- 僅新增：計算並顯示預估範圍 (±10%) ---
                let minRange = Math.floor((currentTotal * 0.9) / 10) * 10;
                let maxRange = Math.ceil((currentTotal * 1.1) / 10) * 10;
                document.getElementById('price-range-display').innerText = `( 視路況預估範圍：$${minRange} - $${maxRange} )`;
                // ------------------------------------

                feeInfoBox.innerHTML = `
                    <div class="fee-title">📋 計費說明</div>
                    <div class="fee-row" style="display:block; font-size:13px; line-height:1.6; color:#2d3748;">
                        <p>🌟 點複製資訊後跳轉至Line對話框長按貼上即可貼上行程</p>
                        <p>🌟 跨縣市長途搭乘可點擊選單長途優惠索取直收優惠價</p>
                        <p>🌟 隨機派遣如果搭到進口車，起步價依然是 <b>80</b> 元</p>
                        <p>🌟 避開收費路段為可行駛台74、76、61等快速道路</p>
                        <p>🌟 避開高速公路為行駛平面，不走國道及快速道路</p>
                        <p>🌟 試算僅為參考，若差異過大可聯絡客服進行說明</p>
                    </div>
                `;
                
                detailMsg = finalDist.toFixed(1) + "km/" + finalTime + "min | 里程$" + baseDistFee + "+長途$" + longDistFee + "+時間$" + timeFee + "+起步$" + startFee;
                document.getElementById('result').style.display = 'block';
                document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
            }
        });
    }

function copyAndLine() {
        const isPremium = document.getElementById('premiumCar').checked;
        const isBooking = document.getElementById('enableBooking').checked;
        const isAvoidTolls = document.getElementById('avoidTolls').checked;
        const isAvoidHighways = document.getElementById('avoidHighways').checked;
        
        // 處理預約時間，若勾選預約但未填時間，給予提示
        let bookingTime = "即時出發";
        if (isBooking) {
            const timeVal = document.getElementById('pickupTime').value;
            bookingTime = timeVal ? timeVal.replace('T', ' ') : "未設定預約時間";
        }
        
        // 1. 建立需求清單
        let requirements = [];
        if (isPremium) requirements.push("指定進口車");
        if (isAvoidTolls) requirements.push("避開收費道路");
        if (isAvoidHighways) requirements.push("避開國道收費路段");

        // 2. 格式化需求字串 (如果清單不為空，則換行並加上星號標記)
        let carNote = requirements.length > 0 ? `\n🌟 需求：${requirements.join('、')}` : "";

        // 3. 組合最終訊息 (確保包含 ${carNote})
        const msg = `【共乘行程確認】
預約時間：${bookingTime}
起點：${document.getElementById('start').value}
終點：${document.getElementById('end').value}
路程資訊：${finalDist.toFixed(1)} km / ${finalTime} min 
---
⚠️ 本報價由 I!ne一客 AI 系統產出，僅供參考; ${carNote}`;

        // 執行複製
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(msg).then(() => {
                alert('資訊已複製，請至 Line 貼上訊息！'); 
                window.location.href = "https://lin.ee/o8sVnUW";
            }).catch(err => {
                console.error('無法複製', err);
                alert('複製失敗，請手動截圖');
            });
        } else {
            // 備用方案：針對某些手機瀏覽器不支援 clipboard API 的處理
            const textArea = document.createElement("textarea");
            textArea.value = msg;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            alert('資訊已複製！');
            window.location.href = "https://lin.ee/o8sVnUW";
        }
    }
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtgKupEUkOqUXV5bQMx_5PlXofFu-0vO4&libraries=places&callback=initMap&language=zh-TW" async defer></script>
</body>
</html>
